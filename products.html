<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
</head>

<body>

<h2>Products</h2>

<div id="products">Loading...</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx8L6YgP3bE_4w_95AOpI3mDj5xIuSv-UOXzyCAFupdSfRuKcAYUcvOVaKbVnHphGf3uw/exec?action=getProducts";

async function loadProducts() {

  try {

    let res = await fetch(API);
    let data = await res.json();

    console.log(data); // DEBUG

    let div = document.getElementById("products");
    div.innerHTML = "";

    // 🔥 FIX: handle both formats
    if (data.status === "error") {
      div.innerHTML = "Error: " + data.message;
      return;
    }

    let products = Array.isArray(data) ? data : data;

    if (products.length === 0) {
      div.innerHTML = "No products found";
      return;
    }

    products.forEach(p => {
      div.innerHTML += `
        <div>
          <img src="${p.image}" width="150"><br>
          <b>${p.name}</b><br>
          ₹${p.finalPrice}<br>
        </div>
        <hr>
      `;
    });

  } catch (err) {
    document.getElementById("products").innerText = "Error loading products";
    console.error(err);
  }
}

loadProducts();

</script>

</body>
</html>
