<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sandy Bakes - Products</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #FFF5F5;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #C62828;
      padding: 10px 20px;
      color: white;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: 500;
    }

    /* Product grid */
    #products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 220px;
      background: white;
      margin: 10px;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      background: #C62828;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #a61d1d;
    }

    .price {
      font-weight: bold;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<!-- 🔴 NAVBAR -->
<div class="navbar">
  <h2>Sandy Bakes 🍰</h2>
  <a href="cart.html">🛒 Cart</a>
</div>

<!-- 🧁 PAGE TITLE -->
<h2 style="text-align:center; margin-top:15px;">Our Products</h2>

<!-- 🛍️ PRODUCT LIST -->
<div id="products"></div>

<!-- JS -->
<script src="js/app.js"></script>

</body>
</html>
