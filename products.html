<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
</head>

<body>

<h2>Products</h2>

<div id="products"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx8L6YgP3bE_4w_95AOpI3mDj5xIuSv-UOXzyCAFupdSfRuKcAYUcvOVaKbVnHphGf3uw/exec?action=getProducts";

async function loadProducts() {

  const res = await fetch(API);
  const data = await res.json();

  let div = document.getElementById("products");

  data.forEach(p => {
    div.innerHTML += `
      <div>
        <img src="${p.image}" width="150"/>
        <h3>${p.name}</h3>
        <p>₹${p.finalPrice}</p>
        <button onclick="addToCart('${p.id}','${p.name}',${p.finalPrice})">Add</button>
      </div>
    `;
  });

}

function addToCart(id,name,price){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({id,name,price,qty:1});
  localStorage.setItem("cart",JSON.stringify(cart));
  alert("Added");
}

loadProducts();
</script>

</body>
</html>
